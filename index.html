<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>麻雀カウンター</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      background: #1a472a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 20px;
      user-select: none;
    }

    h1 { font-size: 1.1rem; color: #c8e6c9; letter-spacing: 0.1em; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; }
    .tab {
      padding: 8px 22px;
      font-size: 0.88rem;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      background: transparent;
      color: #688f68;
      cursor: pointer;
      transition: transform 0.08s;
      letter-spacing: 0.04em;
    }
    .tab.active           { background: #2e7d32; color: #fff; border-color: transparent; }
    .tab.active.chiitoi   { background: #e65100; }
    .tab:active           { transform: scale(0.94); }

    /* Counter layout */
    .counter-row { display: flex; gap: 20px; }

    .counter {
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 18px 20px 14px;
      text-align: center;
      width: 140px;
    }

    .counter-label {
      font-size: 0.78rem;
      color: #a5d6a7;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }

    .counter-value {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
      transition: transform 0.1s;
    }

    .counter-max { font-size: 0.7rem; color: #688f68; margin-bottom: 14px; }

    .dots {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 14px;
      max-width: 120px;
    }

    .dot {
      width: 13px; height: 13px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: background 0.2s;
    }
    .dot.on { background: #66bb6a; }

    .btn-plus {
      width: 100%;
      padding: 14px;
      font-size: 1.8rem;
      font-weight: 700;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.08s, background 0.1s;
      margin-bottom: 8px;
    }
    .btn-plus:active   { transform: scale(0.93); background: #1b5e20; }
    .btn-plus:disabled { background: rgba(255,255,255,0.1); color: #555; pointer-events: none; }

    .btn-minus {
      width: 100%;
      padding: 8px;
      font-size: 1.1rem;
      background: transparent;
      color: #688f68;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.08s;
    }
    .btn-minus:active   { transform: scale(0.93); }
    .btn-minus:disabled { opacity: 0.25; pointer-events: none; }

    /* Complete highlight — normal mode */
    .counter.complete .counter-value { color: #69f0ae; }
    .counter.complete .dot.on        { background: #69f0ae; }

    /* Chiitoi mode overrides */
    .chiitoi-mode .counter-label      { color: #ffcc80; }
    .chiitoi-mode .dot.on             { background: #ffb300; }
    .chiitoi-mode .btn-plus           { background: #e65100; }
    .chiitoi-mode .btn-plus:active    { background: #bf360c; }
    .chiitoi-mode .counter.complete .counter-value { color: #ffe57f; }
    .chiitoi-mode .counter.complete .dot.on        { background: #ffe57f; }

    /* Agari banner */
    .agari-banner {
      font-size: 1.6rem;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.4s;
      min-height: 2rem;
      background: linear-gradient(90deg, #00b09b, #96c93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .agari-banner.show { opacity: 1; }

    /* Reset */
    .btn-reset {
      padding: 12px 36px;
      font-size: 0.9rem;
      font-weight: 700;
      background: rgba(255,255,255,0.1);
      color: #a5d6a7;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: transform 0.08s;
    }
    .btn-reset:active { transform: scale(0.95); }

    .screen { display: contents; }
    .screen.hidden { display: none; }
  </style>
</head>
<body>

<h1>麻雀カウンター</h1>

<div class="tabs">
  <button class="tab active" id="tab-normal"  onclick="setMode('normal')">通常</button>
  <button class="tab chiitoi" id="tab-chiitoi" onclick="setMode('chiitoi')">七対子</button>
</div>

<!-- 通常モード -->
<div class="screen" id="screen-normal">
  <div class="counter-row">
    <div class="counter" id="c-mentsu">
      <div class="counter-label">メンツ</div>
      <div class="counter-value" id="v-mentsu">0</div>
      <div class="counter-max">/ 4</div>
      <div class="dots" id="d-mentsu"></div>
      <button class="btn-plus"  id="p-mentsu" onclick="add('mentsu')">＋</button>
      <button class="btn-minus" id="m-mentsu" onclick="sub('mentsu')" disabled>－</button>
    </div>
    <div class="counter" id="c-jantou">
      <div class="counter-label">雀頭</div>
      <div class="counter-value" id="v-jantou">0</div>
      <div class="counter-max">/ 1</div>
      <div class="dots" id="d-jantou"></div>
      <button class="btn-plus"  id="p-jantou" onclick="add('jantou')">＋</button>
      <button class="btn-minus" id="m-jantou" onclick="sub('jantou')" disabled>－</button>
    </div>
  </div>
  <div class="agari-banner" id="agari-normal">🎉 アガリ！</div>
</div>

<!-- 七対子モード -->
<div class="screen hidden chiitoi-mode" id="screen-chiitoi">
  <div class="counter-row">
    <div class="counter" id="c-toitsu">
      <div class="counter-label">対子</div>
      <div class="counter-value" id="v-toitsu">0</div>
      <div class="counter-max">/ 7</div>
      <div class="dots" id="d-toitsu"></div>
      <button class="btn-plus"  id="p-toitsu" onclick="add('toitsu')">＋</button>
      <button class="btn-minus" id="m-toitsu" onclick="sub('toitsu')" disabled>－</button>
    </div>
  </div>
  <div class="agari-banner" id="agari-chiitoi">🎉 アガリ！</div>
</div>

<button class="btn-reset" onclick="reset()">リセット</button>

<script>
  const state = { mentsu: 0, jantou: 0, toitsu: 0 };
  const MAX   = { mentsu: 4, jantou: 1, toitsu: 7 };
  let mode = 'normal';

  function setMode(m) {
    mode = m;
    document.getElementById('tab-normal').classList.toggle('active', m === 'normal');
    document.getElementById('tab-chiitoi').classList.toggle('active', m === 'chiitoi');
    document.getElementById('screen-normal').classList.toggle('hidden', m !== 'normal');
    document.getElementById('screen-chiitoi').classList.toggle('hidden', m !== 'chiitoi');
    render();
  }

  function add(key) {
    if (state[key] >= MAX[key]) return;
    state[key]++;
    render();
    bump(`v-${key}`);
  }

  function sub(key) {
    if (state[key] <= 0) return;
    state[key]--;
    render();
  }

  function reset() {
    state.mentsu = 0; state.jantou = 0; state.toitsu = 0;
    render();
  }

  function bump(id) {
    const el = document.getElementById(id);
    el.style.transform = 'scale(1.3)';
    setTimeout(() => el.style.transform = '', 150);
  }

  function renderCounter(key) {
    const v = state[key], max = MAX[key];
    document.getElementById(`v-${key}`).textContent = v;
    document.getElementById(`p-${key}`).disabled = v >= max;
    document.getElementById(`m-${key}`).disabled = v <= 0;
    const dots = document.getElementById(`d-${key}`);
    dots.innerHTML = '';
    for (let i = 0; i < max; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < v ? ' on' : '');
      dots.appendChild(d);
    }
    document.getElementById(`c-${key}`).classList.toggle('complete', v === max);
  }

  function render() {
    renderCounter('mentsu');
    renderCounter('jantou');
    renderCounter('toitsu');
    document.getElementById('agari-normal').classList.toggle(
      'show', state.mentsu === 4 && state.jantou === 1
    );
    document.getElementById('agari-chiitoi').classList.toggle(
      'show', state.toitsu === 7
    );
  }

  render();
</script>
</body>
</html>
